server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;


    access_log /var/log/nginx/splitzy-access.log;
    error_log /var/log/nginx/splitzy-error.log;


    # Serve React SPA
    location / {
        try_files $uri /index.html;
    }

    # Proxy DRF API requests
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Grafana requests
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket support for Grafana
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: static/media from Django if needed
    location /media/ {
        proxy_pass http://api:8000/media/;
    }

    location /static/ {
        proxy_pass http://api:8000/static/;
    }
}

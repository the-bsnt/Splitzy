global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: "splitzy-monitor"
    environment: "test"
    system: "docker"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "host"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

    # --- Loki self-monitoring ---
  - job_name: "loki"
    static_configs:
      - targets:
          - "loki:3100"
        labels:
          service: "loki"

  # --- Promtail self-monitoring ---
  - job_name: "promtail"
    static_configs:
      - targets:
          - "promtail:9080"
        labels:
          service: "promtail"

  - job_name: "blackbox_dns"
    metrics_path: /probe
    params:
      module: [dns_udp] # Tells Blackbox to use its DNS testing engine
    static_configs:
      - targets:
          - 1.1.1.1:53 # The DNS Server you are testing
          - 8.8.8.8:53 # Another DNS Server
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
